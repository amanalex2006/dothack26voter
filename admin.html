<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Niche Research Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700&display=swap');
        :root { --bg-primary: #fcfaf7; --text-primary: #1a1c2c; --accent-warm: #d97706; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); }
        h1, h2, h3, .heading-font { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-gray-200">
            <div>
                <a href="/" class="text-xs text-amber-700 hover:text-amber-900 font-bold uppercase tracking-wider flex items-center mb-1">
                    ← Back to Dashboard
                </a>
                <h1 class="text-3xl font-bold">Admin Console</h1>
            </div>
            <div id="adminProfile" class="flex items-center gap-4 text-sm font-bold text-indigo-700"></div>
        </header>

        <div id="loading" class="text-center py-20 text-gray-500">Checking credentials...</div>

        <div id="content" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Left: Problem Approval Queue -->
            <div>
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm min-h-[400px]">
                    <h2 class="text-xl font-bold heading-font mb-4 flex justify-between items-center">
                        Approval Queue
                        <span id="pendingCount" class="text-xs bg-amber-100 text-amber-700 font-bold px-2 py-1 rounded-full">0</span>
                    </h2>
                    <p class="text-xs text-gray-500 mb-6">Review user-submitted problems before they appear on the main dashboard.</p>
                    
                    <div id="pendingList" class="space-y-4"></div>
                </div>
            </div>

            <!-- Right: Users List -->
            <div>
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm min-h-[400px]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold heading-font">Registered Users</h2>
                        <span id="userCount" class="text-xs bg-gray-100 text-gray-600 font-bold px-2 py-1 rounded-full">0 Accounts</span>
                    </div>

                    <div id="usersList" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Reset User Password Modal -->
    <div id="resetModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Reset Password for <span id="resetHandle" class="text-indigo-600"></span></h2>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">New Password (Auto-generated)</label>
                <div class="flex gap-2">
                    <input type="text" id="newResetPass" class="w-full border-gray-300 rounded-md p-2 border font-mono text-sm" readonly>
                    <button onclick="generateResetPass()" class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded font-bold hover:bg-indigo-200">Generate</button>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button onclick="closeResetModal()" class="px-4 py-2 border rounded-md text-gray-700">Cancel</button>
                <button onclick="confirmResetPass()" class="px-4 py-2 bg-red-600 text-white font-bold rounded-md">Save & Close</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uwpicpzjugdaitccnftn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3cGljcHpqdWdkYWl0Y2NuZnRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3OTkzNzcsImV4cCI6MjEwMDM3NTM3N30.4KyK3dm985ls4B8k43dKv-SKtDqmCaYiMsVXuosHGFQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const words = ["blue", "ocean", "jump", "fast", "wind", "tree", "sun", "moon", "star", "bird", "rain", "fire", "rock", "leaf", "code", "data", "link"];

        let currentUser = null;
        let pendingProblems = [];
        let allUsers = [];
        let selectedResetUserId = null;

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function getSession() {
            const raw = localStorage.getItem('appSession');
            return raw ? JSON.parse(raw) : null;
        }

        async function initApp() {
            currentUser = getSession();
            if (!currentUser || currentUser.role !== 'admin') {
                alert("Access Denied. Admin privileges required.");
                window.location.href = '/';
                return;
            }

            document.getElementById('adminProfile').textContent = `Admin: u/${currentUser.handle}`;
            
            await Promise.all([loadPendingProblems(), loadUsers()]);
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        async function loadPendingProblems() {
            const { data } = await supabase.from('problems').select('*, tracks(title), app_users(handle)').eq('status', 'pending').order('created_at', { ascending: false });
            pendingProblems = data || [];
            document.getElementById('pendingCount').textContent = pendingProblems.length;
            
            const list = document.getElementById('pendingList');
            list.innerHTML = '';
            
            if (pendingProblems.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm">No pending problems.</div>`;
                return;
            }

            pendingProblems.forEach(p => {
                const div = document.createElement('div');
                div.className = "p-4 border border-gray-200 rounded-xl bg-gray-50";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-gray-900">${p.title}</h3>
                        <span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-bold">${p.tracks?.title || p.track_key}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-3">${p.detail}</p>
                    <div class="text-xs text-gray-400 mb-4">Submitted by: u/${p.app_users?.handle || 'Unknown'}</div>
                    <div class="flex gap-2">
                        <button onclick="updateProblemStatus('${p.problem_key}', 'approved')" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-1.5 rounded text-sm transition">Approve</button>
                        <button onclick="updateProblemStatus('${p.problem_key}', 'rejected')" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-1.5 rounded text-sm transition">Reject</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function updateProblemStatus(key, status) {
            const { error } = await supabase.from('problems').update({ status }).eq('problem_key', key);
            if (error) alert("Error updating status");
            else await loadPendingProblems();
        }

        async function loadUsers() {
            const { data } = await supabase.from('app_users').select('id, handle, name, role').order('role').order('handle');
            allUsers = data || [];
            document.getElementById('userCount').textContent = `${allUsers.length} Accounts`;
            
            const list = document.getElementById('usersList');
            list.innerHTML = '';

            allUsers.forEach(u => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-3 border border-gray-100 rounded-lg hover:bg-gray-50 transition";
                div.innerHTML = `
                    <div>
                        <div class="font-bold text-gray-900 text-sm">u/${u.handle} ${u.role === 'admin' ? '<span class="text-amber-600 ml-1">(Admin)</span>' : ''}</div>
                        <div class="text-xs text-gray-500">${u.name}</div>
                    </div>
                    <button onclick="openResetModal('${u.id}', '${u.handle}')" class="text-xs border border-gray-300 px-3 py-1.5 rounded hover:bg-gray-200 font-bold text-gray-600 transition">Regenerate Password</button>
                `;
                list.appendChild(div);
            });
        }

        function generateWords(min, max) {
            let pass = "";
            while (pass.length < min || pass.length > max) {
                let w1 = words[Math.floor(Math.random()*words.length)];
                let w2 = words[Math.floor(Math.random()*words.length)];
                let w3 = words[Math.floor(Math.random()*words.length)];
                pass = `${w1}-${w2}-${w3}`;
            }
            return pass;
        }

        function openResetModal(userId, handle) {
            selectedResetUserId = userId;
            document.getElementById('resetHandle').textContent = `u/${handle}`;
            document.getElementById('resetModal').style.display = 'flex';
            generateResetPass();
        }
        function closeResetModal() {
            document.getElementById('resetModal').style.display = 'none';
        }
        function generateResetPass() {
            document.getElementById('newResetPass').value = generateWords(8, 12);
        }
        async function confirmResetPass() {
            const newPass = document.getElementById('newResetPass').value;
            const pHash = await sha256(newPass);
            const { error } = await supabase.from('app_users').update({ password_hash: pHash }).eq('id', selectedResetUserId);
            if (error) alert("Error resetting password");
            else {
                alert(`Password successfully reset to:\n\n${newPass}\n\nPlease share this with the user securely.`);
                closeResetModal();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
